schemaVersion: "1"
kind: mixin
name: peter-dev-sandbox-kit
displayName: "Peter Dev Sandbox Kit"

commands:
  startup:
    - command:
        - sh
        - -c
        - |
          if ! git config --global url."https://github.com/".insteadOf "git@github.com:"; then
            printf '%s\n' 'Warning: failed to configure GitHub HTTPS rewrite' >&2
          fi
          if ! git -C /home/agent/dotfiles pull --ff-only; then
            printf '%s\n' 'Warning: failed to update dotfiles; using the existing checkout' >&2
          fi
          if ! git -C /home/agent/dotfiles submodule update --init --recursive; then
            printf '%s\n' 'Warning: failed to refresh dotfiles submodules; using existing content' >&2
          fi
          DOTFILES_UPDATE=0 \
          DOTFILES_INSTALL_CODEX_CONFIG=0 \
          DOTFILES_INSTALL_CODEX_RULES=0 \
          /home/agent/dotfiles/setup.sh
      user: "1000"
      description: Refresh and install dotfiles

network:
  allowedDomains:
    - github.com
